<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="800" height="120">
  <defs>
    <style>
      @keyframes glow {
        0%, 100% { filter: drop-shadow(0 0 2px #58a6ff); }
        50% { filter: drop-shadow(0 0 10px #58a6ff); }
      }
      @keyframes scan {
        0% { transform: translateY(-60px); opacity: 0; }
        10% { opacity: 0.8; }
        90% { opacity: 0.8; }
        100% { transform: translateY(60px); opacity: 0; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes dotPulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
      .title { animation: glow 3s ease-in-out infinite; }
      .scan { animation: scan 4s ease-in-out infinite; }
      .cursor { animation: blink 1s step-end infinite; }
      .dot { animation: dotPulse 2s ease-in-out infinite; }
      .dot2 { animation: dotPulse 2s ease-in-out infinite; animation-delay: 0.3s; }
      .dot3 { animation: dotPulse 2s ease-in-out infinite; animation-delay: 0.6s; }
    </style>
  </defs>

  <rect width="800" height="120" fill="#0d1117"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1c2333" stroke-width="0.3"/>
  </pattern>
  <rect width="800" height="120" fill="url(#grid)" opacity="0.5"/>

  <!-- Scanning line animation -->
  <line x1="150" y1="0" x2="650" y2="0" stroke="#58a6ff" stroke-width="0.5" class="scan" opacity="0"/>

  <!-- Top decorative dots -->
  <circle cx="380" cy="28" r="2" fill="#58a6ff" class="dot"/>
  <circle cx="400" cy="28" r="2" fill="#58a6ff" class="dot2"/>
  <circle cx="420" cy="28" r="2" fill="#58a6ff" class="dot3"/>

  <!-- Main text with glow -->
  <text x="400" y="72" text-anchor="middle" fill="#e6edf3"
        font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="34" font-weight="600" letter-spacing="6"
        class="title">eehcx</text>

  <!-- Blinking cursor -->
  <text x="475" y="72" text-anchor="middle" fill="#58a6ff"
        font-family="monospace" font-size="34" font-weight="400"
        class="cursor">▎</text>

  <!-- Bottom decorative dots -->
  <circle cx="380" cy="92" r="2" fill="#58a6ff" class="dot3"/>
  <circle cx="400" cy="92" r="2" fill="#58a6ff" class="dot2"/>
  <circle cx="420" cy="92" r="2" fill="#58a6ff" class="dot"/>
</svg>
